<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="580" viewBox="0 0 1200 580"
     role="img" aria-labelledby="sheetsTitle sheetsDesc">
  <title id="sheetsTitle">The two sheets and what each one returns</title>
  <desc id="sheetsDesc">Side by side, each rising over a dimmed app screen: DebugInputSheet, a bottom sheet listing three saved URLs with delete buttons above a text field and an OK button, returning a Future of nullable String; and DebugSelectSheet, a bottom sheet with three radio options and an OK button, returning a Future of nullable int index.</desc>

  <defs>
    <clipPath id="screenA"><rect x="64" y="112" width="500" height="360" rx="18"/></clipPath>
    <clipPath id="screenB"><rect x="636" y="112" width="500" height="360" rx="18"/></clipPath>
  </defs>

  <rect width="1200" height="580" rx="26" fill="#0C1117"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">

    <!-- ============ A: DebugInputSheet ============ -->
    <text x="64" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="19" font-weight="700" fill="#EAF0F6">DebugInputSheet</text>
    <text x="64" y="88" font-size="15" fill="#7C8A99">a text field that remembers what you typed before</text>

    <rect x="64" y="112" width="500" height="360" rx="18" fill="#05080B" stroke="#1B2531"/>
    <g clip-path="url(#screenA)">
      <!-- your app, dimmed behind the sheet -->
      <rect x="92" y="140" width="118" height="9" rx="4.5" fill="#1B2530"/>
      <rect x="92" y="160" width="196" height="9" rx="4.5" fill="#141B24"/>

      <path d="M64 204 a18 18 0 0 1 18 -18 h464 a18 18 0 0 1 18 18 v268 h-500 z" fill="#F6F8FA"/>
      <rect x="292" y="198" width="44" height="5" rx="2.5" fill="#C4CED8"/>

      <text x="92" y="242" font-size="21" font-weight="600" fill="#141C25">H5 URL</text>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#2B3844">
        <text x="92" y="277">https://staging.example.com/h5</text>
        <text x="92" y="317">http://192.168.1.14:8080</text>
        <text x="92" y="357">https://demo.acme.dev/h5</text>
      </g>
      <g stroke="#E3E8EE" stroke-width="1">
        <line x1="92" y1="291" x2="536" y2="291"/>
        <line x1="92" y1="331" x2="536" y2="331"/>
        <line x1="92" y1="371" x2="536" y2="371"/>
      </g>
      <g fill="none" stroke="#93A1AE" stroke-width="1.6" stroke-linecap="round">
        <g transform="translate(520 264)"><path d="M-7 0 h14 M-5 0 v9 a2 2 0 0 0 2 2 h6 a2 2 0 0 0 2 -2 v-9 M-2 -3 h4"/></g>
        <g transform="translate(520 304)"><path d="M-7 0 h14 M-5 0 v9 a2 2 0 0 0 2 2 h6 a2 2 0 0 0 2 -2 v-9 M-2 -3 h4"/></g>
        <g transform="translate(520 344)"><path d="M-7 0 h14 M-5 0 v9 a2 2 0 0 0 2 2 h6 a2 2 0 0 0 2 -2 v-9 M-2 -3 h4"/></g>
      </g>

      <text x="92" y="400" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="15" fill="#141C25">https://</text>
      <rect x="167" y="385" width="2" height="18" fill="#3D7EFF"/>
      <line x1="92" y1="410" x2="536" y2="410" stroke="#141C25" stroke-width="1.6"/>

      <rect x="92" y="422" width="444" height="40" rx="8" fill="#3D7EFF"/>
      <text x="314" y="448" text-anchor="middle" font-size="15" font-weight="600"
            fill="#FFFFFF" letter-spacing="0.6">OK</text>
    </g>

    <text x="64" y="514" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#6FA8FF">→ Future&lt;String?&gt;</text>
    <text x="64" y="540" font-size="15" fill="#7C8A99">the field's text when OK is tapped · null if dismissed</text>

    <!-- ============ B: DebugSelectSheet ============ -->
    <text x="636" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="19" font-weight="700" fill="#EAF0F6">DebugSelectSheet</text>
    <text x="636" y="88" font-size="15" fill="#7C8A99">a radio list — no controllers, no state to wire up</text>

    <rect x="636" y="112" width="500" height="360" rx="18" fill="#05080B" stroke="#1B2531"/>
    <g clip-path="url(#screenB)">
      <rect x="664" y="140" width="118" height="9" rx="4.5" fill="#1B2530"/>
      <rect x="664" y="160" width="196" height="9" rx="4.5" fill="#141B24"/>

      <path d="M636 238 a18 18 0 0 1 18 -18 h464 a18 18 0 0 1 18 18 v234 h-500 z" fill="#F6F8FA"/>
      <rect x="864" y="232" width="44" height="5" rx="2.5" fill="#C4CED8"/>

      <text x="886" y="276" text-anchor="middle" font-size="21" font-weight="600" fill="#141C25">Select WebView</text>

      <g font-size="16" fill="#2B3844">
        <text x="720" y="315">New WebView</text>
        <text x="720" y="355">Old WebView</text>
        <text x="720" y="395">System default</text>
      </g>
      <g fill="none" stroke="#8E9BA8" stroke-width="1.8">
        <circle cx="692" cy="310" r="9" stroke="#3D7EFF"/>
        <circle cx="692" cy="350" r="9"/>
        <circle cx="692" cy="390" r="9"/>
      </g>
      <circle cx="692" cy="310" r="4.5" fill="#3D7EFF"/>
      <g stroke="#E3E8EE" stroke-width="1">
        <line x1="664" y1="330" x2="1108" y2="330"/>
        <line x1="664" y1="370" x2="1108" y2="370"/>
        <line x1="664" y1="410" x2="1108" y2="410"/>
      </g>

      <rect x="664" y="422" width="444" height="40" rx="8" fill="#3D7EFF"/>
      <text x="886" y="448" text-anchor="middle" font-size="15" font-weight="600"
            fill="#FFFFFF" letter-spacing="0.6">OK</text>
    </g>

    <text x="636" y="514" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#6FA8FF">→ Future&lt;int?&gt;</text>
    <text x="636" y="540" font-size="15" fill="#7C8A99">index of the checked item · null if dismissed</text>
  </g>
</svg>
